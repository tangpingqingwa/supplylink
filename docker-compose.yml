services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: supplylink
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supplylink}
      POSTGRES_DB: supplylink
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplylink"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://supplylink:${DB_PASSWORD:-supplylink}@db:5432/supplylink
    command: sh -c "npm ci --ignore-scripts && npx prisma db push"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://supplylink:${DB_PASSWORD:-supplylink}@db:5432/supplylink
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://supplylink:${DB_PASSWORD:-supplylink}@db:5432/supplylink
      REDIS_URL: redis://redis:6379
    command: sh -c "npx prisma generate && npx tsx src/worker.ts"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
